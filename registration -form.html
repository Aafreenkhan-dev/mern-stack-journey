<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student registration form</title>
    <style>
        .label {
            display: inline-block;
            width: 120px;
        }
        .inputbox {
            width: 250px;
            padding: 5px;
            box-sizing: border-box;
            border: 1px black solid;
            color: black;
        }
        .button {
            background-color: #961923;
            color: rgb(63, 12, 12);
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
        body {
            background-color: #c09797;
            font-family: italic;
        }
    </style>
</head>
<body>
   <h1>Student Registration form
     </h1>
   <form>
    <label for="username" class="label">Students name:</label>
    <input type="text" id="username" name="students name" required placeholder="Enter your name" class="inputbox">
    <br><br>
    <label for="num" class="label">Roll no:      </label>
    <input type="number" id="num" name="roll no" required class="inputbox"><br><br>
    <label for="fathers-name" class="label">Father's name:</label>
    <input type="text" id="fathers-name" name="fathers-name" required placeholder="Enter your father's name" class="inputbox"><br><br>
    
    <!-- DOB: label and three dropdowns in same line -->
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; max-width:420px;">
      <label class="label" style="margin:0;">Date of Birth:</label>
      <select id="dob-day" name="dob-day" required style="width:60px;" class="inputbox">
        <option value="" disabled selected>Day</option>
        <!-- days 1-31 -->
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>11</option>
        <option>12</option>
        <option>13</option>
        <option>14</option>
        <option>15</option>
        <option>16</option>
        <option>17</option>
        <option>18</option>
        <option>19</option>
        <option>20</option>
        <option>21</option>
        <option>22</option>
        <option>23</option>
        <option>24</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
        <option>28</option>
        <option>29</option>
        <option>30</option>
        <option>31</option>
      </select>

      <select id="dob-month" name="dob-month" required style="width:90px;" class="inputbox">
        <option value="" disabled selected>Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
      </select>

      <select id="dob-year" name="dob-year" required style="width:70px;" class="inputbox">
        <option value="" disabled selected>Year</option>
        <!-- years 2000-2026 -->
        <option>2000</option>
        <option>2001</option>
        <option>2002</option>
        <option>2003</option>
        <option>2004</option>
        <option>2005</option>
        <option>2006</option>
        <option>2007</option>
        <option>2008</option>
        <option>2009</option>
        <option>2010</option>
        <option>2011</option>
        <option>2012</option>
        <option>2013</option>
        <option>2014</option>
        <option>2015</option>
        <option>2016</option>
        <option>2017</option>
        <option>2018</option>
        <option>2019</option>
        <option>2020</option>
        <option>2021</option>
        <option>2022</option>
        <option>2023</option>
        <option>2024</option>
        <option>2025</option>
        <option>2026</option>
      </select>
    </div><br>
    <label for="mobile-num" class="label">Mobile number:</label>
    <input type="tel" id="mobile-num" name="mobile-num" required  class="inputbox"><br><br>
    <label for="email" class="label">Email:</label>
    <input type="email" id="email" name="email" required class="inputbox"><br><br>
    <label for="gender" class="label">Gender:</label>
    <input type="radio" id="male" name="gender" value="male" required>
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="female" >
    <label for="female">Female</label><br><br>
    <label for="department" >Department:</label>
    <input type="checkbox" id="CSE" name="department" value="CSE" required>
  
    <label for="CSE">CSE</label>
    <input type="checkbox" id="ECE" name="department" value="ECE" >
    <label for="ECE">ECE</label>
    <input type="checkbox" id="IT" name="department" value="IT" >
    <label for="IT">IT</label>
    <input type="checkbox" id="civil" name="department" value="CIVIL" >
    <label for="civil">Civil</label><br><br>
    <label for="students photo">Student Photo:</label>
    <input type="file" id="students photo" name="students photo" required><br><br>
    <label for="city" class="label">City:</label>
    <input type="text" id="city" name="city" required class="inputbox"><br><br>
    <label for="address" class="label">Address:</label>
    <input type="text" id="address" name="address" required class="inputbox"><br><br>
    <div style="text-align:center;">
      <button type="submit" class="button">Register</button>
    </div>
   </form>

</body>
</html>
